name: GPT Daily KI & Tech Briefing

on:
  schedule:
    # GitHub cron uses UTC. Two slots plus the Berlin-time guard cover CET and CEST.
    - cron: "7 7 * * *"
    - cron: "7 8 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Briefing-Datum (YYYY-MM-DD); leer = heutiges Datum in Berlin"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: gpt-daily-briefing
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      TZ: Europe/Berlin
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: gpt-5.6

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Guard Berlin schedule
        id: schedule
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" || "$(date +%H)" == "09" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping duplicate UTC slot; Berlin hour is $(date +%H)."
          fi

      - name: Resolve briefing date
        if: steps.schedule.outputs.run == 'true'
        id: briefing
        shell: bash
        run: |
          requested="${{ inputs.date }}"
          if [[ -n "$requested" ]]; then
            if [[ ! "$requested" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
              echo "Invalid date: $requested" >&2
              exit 1
            fi
            briefing_date="$requested"
          else
            briefing_date="$(date +%F)"
          fi
          year="${briefing_date:0:4}"
          month="${briefing_date:5:2}"
          file="briefings/$year/$month/$briefing_date-gpt-ki-tech-briefing.md"
          echo "date=$briefing_date" >> "$GITHUB_OUTPUT"
          echo "file=$file" >> "$GITHUB_OUTPUT"

      - name: Generate GPT briefing
        if: steps.schedule.outputs.run == 'true'
        run: node scripts/generate_gpt_briefing.mjs --date "${{ steps.briefing.outputs.date }}"

      - name: Validate GPT briefing
        if: steps.schedule.outputs.run == 'true'
        run: node scripts/validate_gpt_briefing.mjs "${{ steps.briefing.outputs.file }}"

      - name: Commit and push
        if: steps.schedule.outputs.run == 'true'
        shell: bash
        run: |
          file="${{ steps.briefing.outputs.file }}"
          if [[ -z "$(git status --porcelain -- "$file")" ]]; then
            echo "No new briefing to publish."
            exit 0
          fi
          git config user.name "GPT Briefing Bot"
          git config user.email "actions@users.noreply.github.com"
          git add "$file"
          git commit -m "briefing(gpt): add daily briefing for ${{ steps.briefing.outputs.date }}"
          git push
